name: sodium
description: Dart bindings for libsodium, for the Dart-VM and for the Web
version: 4.0.3
homepage: https://github.com/Skycoder42/libsodium_dart_bindings

environment:
  sdk: ^3.12.0
resolution: workspace

executables:
  sodium-update-web: update_web

dependencies:
  archive: ^4.0.9
  args: ^2.7.0
  code_assets: ^1.2.1
  crypto: ^3.0.7
  ffi: ^2.2.0
  freezed_annotation: ^3.1.0
  hooks: ^2.0.2
  html: ^0.15.6
  meta: ^1.18.0
  path: ^1.9.1
  posix: ^6.5.0

dev_dependencies:
  analyzer: ^12.1.0
  build_runner: ^2.15.0
  cider: ^0.2.10
  code_builder: ^4.11.1
  collection: ^1.19.1
  coverage: ^1.15.1
  dart_pre_commit: ^6.1.3
  dart_style: ^3.1.8
  dart_test_tools: ^7.2.5
  ffigen: ^20.1.1
  freezed: ^3.2.6-dev.1
  glob: ^2.1.3
  mocktail: ^1.0.5
  test: ^1.31.0
  web: ^1.1.1

cider:
  link_template:
    tag: https://github.com/Skycoder42/libsodium_dart_bindings/releases/tag/sodium-v%tag%
    diff: https://github.com/Skycoder42/libsodium_dart_bindings/compare/sodium-v%from%...sodium-v%to%

dart_pre_commit:
  pull-up-dependencies:
    allowed:
      - meta
