name: CI/CD for sodium

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/sodium/**"
      - ".github/workflows/sodium_ci.yaml"
      - ".github/workflows/sodium_cd.yaml"

jobs:
  ci:
    name: CI
    uses: Skycoder42/dart_test_tools/.github/workflows/dart.yml@main
    with:
      workingDirectory: packages/sodium
      env: >-
        {
          "NIX_SKIP_SODIUM_BUILD_HOOKS": "1",
          "NIX_HOOKS_ENABLE_DEBUG_LOGGING": "1"
        }
      needsFlutterSdk: true
      buildRunner: true
      unitTestPaths: -P unit
      coverageExclude: >-
        "**/*.freezed.dart"
        "**/*.ffi.dart"
        "**/*.ffi.wrapper.dart"
        "**/*.js.dart"
      integrationTestPaths: -P integration
      integrationTestSetup: >-
        {
          "linux": "dart run tool/libsodium/download.dart",
          "windows": "dart run tool/libsodium/download.dart",
          "macos": "dart run tool/libsodium/download.dart",
          "web": "dart run tool/integration/setup_web.dart"
        }

  flutter_tests:
    name: Flutter integration tests
    uses: Skycoder42/dart_test_tools/.github/workflows/flutter-integration.yml@main
    needs:
      - ci
    with:
      enabledPlatforms: "[]"
      workingDirectory: packages/sodium/example
      env: >-
        {
          "NIX_SKIP_SODIUM_BUILD_HOOKS": "1",
          "NIX_HOOKS_ENABLE_DEBUG_LOGGING": "1"
        }
      buildDependencies: sodium
      integrationTestPaths: integration_test/app_test.dart
      integrationTestSetup: >-
        {
          "android": "cd .. && dart run tool/libsodium/download.dart",
          "ios": "cd .. && dart run tool/libsodium/download.dart",
          "linux": "cd .. && dart run tool/libsodium/download.dart",
          "windows": "cd .. && dart run tool/libsodium/download.dart",
          "macos": "cd .. && dart run tool/libsodium/download.dart",
          "web": "dart run sodium:update_web --sumo"
        }
      firebaseProjectId: libsodium-dart-bindings-9b953
    secrets:
      firebaseCredentials: ${{ secrets.FIREBASE_CREDENTIALS }}
      provisioningProfile: ${{ secrets.PROVISIONING_PROFILE }}
      signingIdentity: ${{ secrets.SIGNING_IDENTITY }}
      signingIdentityPassphrase: ${{ secrets.SIGNING_IDENTITY_PASSPHRASE }}

  cd:
    name: CD
    uses: Skycoder42/dart_test_tools/.github/workflows/release.yml@main
    needs:
      - ci
      - flutter_tests
    with:
      workingDirectory: packages/sodium
      tagPrefix: sodium-v
    secrets:
      githubToken: ${{ secrets.GH_PAT }}
